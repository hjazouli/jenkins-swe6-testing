stages:
  - build
  - deploy
  - verify

variables:
  # Ensure the runner can find your homebrew tools
  PATH: "/Applications/ArmGNUToolchain/15.2.rel1/arm-none-eabi/bin:/opt/homebrew/bin:/usr/local/bin:/usr/bin:/bin:/usr/sbin:/sbin"

build_firmware:
  stage: build
  tags:
    - mac-m4
  script:
    - echo "🔨 Compiling BCM Firmware..."
    - make -C firmware/BCM_Firmware clean all
  artifacts:
    paths:
      - firmware/BCM_Firmware/build/BCM_Firmware.bin

flash_hardware:
  stage: deploy
  tags:
    - mac-m4
  script:
    - echo "⚡ Flashing Nucleo Board..."
    - chmod +x ./scripts/deploy_bcm.sh
    - ./scripts/deploy_bcm.sh
  environment:
    name: hardware-bench

hil_test_validation:
  stage: verify
  tags:
    - mac-m4
  script:
    - echo "🧪 Executing Industry-Standard HIL Validation..."
    - source .venv/bin/activate
    - pytest tests/functional -s -v --target=hardware
  rules:
    - if: '$CI_COMMIT_BRANCH == "develop" || $CI_COMMIT_BRANCH == "infra/hal-uart-integration"'
      when: always
