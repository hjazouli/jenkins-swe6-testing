stages:
  - build
  - deploy
  - verify

variables:
  # Ensure the runner can find your homebrew tools
  PATH: "/Applications/ArmGNUToolchain/15.2.rel1/arm-none-eabi/bin:/opt/homebrew/bin:/usr/local/bin:/usr/bin:/bin:/usr/sbin:/sbin"

build_firmware:
  stage: build
  tags:
    - mac-m4
  script:
    - echo "🔨 Compiling BCM Firmware..."
    - make -C firmware/BCM_Firmware clean all
  artifacts:
    paths:
      - firmware/BCM_Firmware/build/BCM_Firmware.bin

flash_hardware:
  stage: deploy
  tags:
    - mac-m4
  script:
    - echo "⚡ Flashing Nucleo Board..."
    - chmod +x ./scripts/deploy_bcm.sh
    - ./scripts/deploy_bcm.sh
  environment:
    name: hardware-bench

hil_test_validation:
  stage: verify
  tags:
    - mac-m4
  script:
    - echo "🧪 Preparing Professional HIL Environment..."
    - if [ ! -d ".venv" ]; then python3 -m venv .venv; fi
    - source .venv/bin/activate
    - pip install pytest pyserial allure-pytest pytest-metadata
    - echo "🚀 Executing Industry-Standard HIL Validation..."
    - pytest tests/functional -s -v --alluredir=allure-results --target=hardware
    - echo "📊 Generating Allure Clinical Report..."
    - /opt/homebrew/bin/allure generate allure-results --clean -o allure-report
  artifacts:
    when: always
    paths:
      - allure-report
    expire_in: 1 week
  rules:
    - if: '$CI_COMMIT_BRANCH == "develop" || $CI_COMMIT_BRANCH == "infra/hal-uart-integration"'
      when: always
